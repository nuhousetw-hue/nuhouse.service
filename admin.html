  function _batchPreviewCount() {
    var from = document.getElementById('bf-date-from').value;
    var to   = document.getElementById('bf-date-to').value;
    if (!from || !to) { document.getElementById('batch-preview').textContent = ''; return; }
    var dows = [];
    for (var i = 0; i < 7; i++) { if (document.getElementById('bf-dow-' + i).checked) dows.push(i); }
    var count = 0, cur = new Date(from), end = new Date(to);
    while (cur <= end) { if (dows.indexOf(cur.getDay()) >= 0) count++; cur.setDate(cur.getDate() + 1); }
    document.getElementById('batch-preview').textContent = count > 0 ? '將建立 ' + count + ' 筆時段' : '日期範圍內無符合條件的日期';
  }

  // 讓日期/星期改變時即時更新預覽
  (function() {
    function _hookBatch() {
      ['bf-date-from','bf-date-to'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('change', _batchPreviewCount);
      });
      for (var i = 0; i < 7; i++) {
        (function(ii) {
          var cb = document.getElementById('bf-dow-' + ii);
          if (cb) cb.addEventListener('change', _batchPreviewCount);
        })(i);
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', _hookBatch);
    else _hookBatch();
  })();

  function submitBatch() {
    var pc      = document.getElementById('select-project').value;
    var svc     = document.getElementById('bf-svc').value;
    var time    = document.getElementById('bf-time').value;
    var cap     = parseInt(document.getElementById('bf-capacity').value) || 1;
    var open    = document.getElementById('bf-open').checked;
    var allowed = document.getElementById('bf-allowed').value.trim();
    var from    = document.getElementById('bf-date-from').value;
    var to      = document.getElementById('bf-date-to').value;
    if (!pc)   { showToast('請先選擇建案', 'error'); return; }
    if (!svc || !time) { showToast('請填寫服務項目及時間', 'error'); return; }
    if (!from || !to)  { showToast('請填寫日期範圍', 'error'); return; }
    if (from > to)     { showToast('起始日期不能晚於結束日期', 'error'); return; }
    var dows = [];
    for (var i = 0; i < 7; i++) { if (document.getElementById('bf-dow-' + i).checked) dows.push(i); }
    if (!dows.length) { showToast('請至少選擇一個星期', 'error'); return; }
    // 產生所有符合條件的日期
    var slots = [], cur = new Date(from + 'T00:00:00'), end = new Date(to + 'T00:00:00');
    while (cur <= end) {
      if (dows.indexOf(cur.getDay()) >= 0) {
        var ds = cur.getFullYear() + '/' + _pad2(cur.getMonth()+1) + '/' + _pad2(cur.getDate());
        slots.push({ serviceType: svc, date: ds, time: time, capacity: cap, open: open, allowedStr: allowed });
      }
      cur.setDate(cur.getDate() + 1);
    }
    if (!slots.length) { showToast('日期範圍內無符合條件的日期', 'error'); return; }
    if (!confirm('將新增 ' + slots.length + ' 筆「' + svc + ' ' + time + '」時段，確定？')) return;
    showLoading(true);
    callServer('serverAdminBatchAddSlots', pc, slots)
      .then(function(r) {
        if (r && r.success) {
          showToast('已新增 ' + r.count + ' 筆時段', 'success');
          document.getElementById('batch-form-wrap').classList.add('hidden');
          slotStg.loadedProject = null;
          loadSlotCal(true);
        } else { showToast((r && r.message) || '建立失敗', 'error'); showLoading(false); }
      })
      .catch(function() { showToast('建立失敗', 'error'); showLoading(false); });
  }

  function deleteSlotItem(rowIdx, bookedCount, svcType, time) {
    var msg;
    if (bookedCount > 0) {
      msg = '⚠️ 注意：此時段（' + svcType + ' ' + time + '）目前已有 ' + bookedCount + ' 筆預約資料。\n\n任何刪除或異動，若該時段已有預約之客戶也將消失，此操作無法復原。\n\n確定要刪除嗎？';
    } else {
      msg = '確定刪除「' + svcType + ' ' + time + '」時段？此操作無法復原。';
    }
    if (!confirm(msg)) return;
    var pc = document.getElementById('select-project').value;
    showLoading(true);
    callServer('serverAdminDeleteSlot', pc, rowIdx)
      .then(function(r) {
        if (r && r.success) { showToast('已刪除', 'success'); slotStg.loadedProject = null; loadSlotCal(true); }
        else { showToast((r && r.message) || '刪除失敗', 'error'); showLoading(false); }
      })
      .catch(function() { showToast('刪除失敗', 'error'); showLoading(false); });
  }
  // ────────────────────────────────────────────────────────────

  // ── 行事曆 ──────────────────────────────────────────────────
  var calState = {
    year: new Date().getFullYear(),
    month: new Date().getMonth(),
    data: [],
    slots: [],
    svcFilter: '',
    loadedProject: null, loadedYear: null, loadedMonth: null
  };

  function _pad2(n) { return String(n).padStart(2, '0'); }

  function loadCalendar(force) {
    var projectCode = document.getElementById('select-project').value;
    if (!projectCode) {
      document.getElementById('cal-title').textContent = calState.year + '年 ' + (calState.month+1) + '月';
      document.getElementById('cal-grid').innerHTML = '<div class="cal-empty-msg">請先選擇建案</div>';
      return;
    }
    var y = calState.year, m = calState.month;
    // 同建案同月份已有資料則直接渲染
    if (!force && calState.loadedProject === projectCode && calState.loadedYear === y && calState.loadedMonth === m) {
      buildCalSvcFilter(calState.data);
      renderCalendar(calState.data);
      return;
    }
    var firstDay = y + '/' + _pad2(m+1) + '/01';
    var lastDate = new Date(y, m+1, 0).getDate();
    var lastDay  = y + '/' + _pad2(m+1) + '/' + _pad2(lastDate);
    showLoading(true);
    Promise.all([
      callServer('serverAdminGetBookings', projectCode, firstDay, lastDay, '已預約', true),
      callServer('serverAdminGetSlots', projectCode)
    ])
      .then(function(results) {
        calState.data  = Array.isArray(results[0]) ? results[0] : [];
        calState.slots = Array.isArray(results[1]) ? results[1] : [];
        calState.loadedProject = projectCode;
        calState.loadedYear    = y;
        calState.loadedMonth   = m;
        buildCalSvcFilter(calState.data, calState.slots);
        renderCalendar(calState.data);
        var now = new Date();
        var upd = now.getFullYear() + '/' + _pad2(now.getMonth()+1) + '/' + _pad2(now.getDate()) +
                  ' ' + _pad2(now.getHours()) + ':' + _pad2(now.getMinutes()) + ':' + _pad2(now.getSeconds());
        var el = document.getElementById('cal-updated');
        if (el) el.textContent = '最後更新：' + upd;
      })
      .catch(function() {
        document.getElementById('cal-grid').innerHTML = '<div class="cal-empty-msg">載入失敗，請重新整理</div>';
      })
      .then(function() { showLoading(false); });
  }

  function exportCalPdf() {
    var sel = document.getElementById('select-project');
    var projectName = sel.selectedIndex > 0 ? sel.options[sel.selectedIndex].text : '';
    var monthTitle  = document.getElementById('cal-title').textContent;
    var ph = document.getElementById('cal-print-header');
    if (ph) ph.textContent = projectName + '　' + monthTitle + '　預約行事曆';
    window.print();
  }

  function calNav(dir) {
    calState.month += dir;
    if (calState.month > 11) { calState.month = 0; calState.year++; }
    if (calState.month < 0)  { calState.month = 11; calState.year--; }
    loadCalendar(); // 月份不同會自動重新取資料
  }

  function buildCalSvcFilter(data, slots) {
    var seen = {};
    data.forEach(function(r) { if (r.serviceType) seen[r.serviceType] = 1; });
    (slots || []).forEach(function(s) { if (s.serviceType) seen[s.serviceType] = 1; });
    var sel = document.getElementById('cal-svc-filter');
    var cur = sel.value;
    sel.innerHTML = '<option value="">全部服務</option>';
    Object.keys(seen).sort().forEach(function(s) {
      var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
    });
    if (cur && seen[cur]) sel.value = cur;
    calState.svcFilter = sel.value;
    sel.onchange = function() { calState.svcFilter = sel.value; renderCalendar(calState.data); };
  }

  function renderCalendar(data) {
    var y = calState.year, m = calState.month;
    var monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('cal-title').textContent = y + '年 ' + monthNames[m];

    var filtered = calState.svcFilter
      ? data.filter(function(r) { return r.serviceType === calState.svcFilter; })
      : data;

    var byDate = {};
    filtered.forEach(function(r) {
      if (!byDate[r.date]) byDate[r.date] = [];
      byDate[r.date].push(r);
    });

    var firstDow   = new Date(y, m, 1).getDay();
    var daysInMonth = new Date(y, m+1, 0).getDate();
    var today = new Date();
    var todayStr = today.getFullYear() + '/' + _pad2(today.getMonth()+1) + '/' + _pad2(today.getDate());

    var html = '';
    for (var i = 0; i < firstDow; i++) html += '<div class="cal-cell cal-empty"></div>';

    for (var d = 1; d <= daysInMonth; d++) {
      var dateStr = y + '/' + _pad2(m+1) + '/' + _pad2(d);
      var dow = new Date(y, m, d).getDay();
      var cls = 'cal-cell';
      if (dateStr === todayStr) cls += ' cal-today';
      if (dow === 0) cls += ' cal-sun';
      if (dow === 6) cls += ' cal-sat';

      html += '<div class="' + cls + '"><div class="cal-day-num">' + d + '</div>';

      var items = (byDate[dateStr] || []).slice().sort(function(a,b) {
        return (a.time||'').localeCompare(b.time||'');
      });
      items.forEach(function(r) {
        var svcCls = (r.serviceType||'').indexOf('客變') >= 0 ? 'svc-kv'
                   : (r.serviceType||'').indexOf('驗屋') >= 0 ? 'svc-yy'
                   : 'svc-other';
        html += '<div class="cal-item ' + svcCls + '">';
        html += '<div class="cal-item-row"><span class="cal-svc">' + esc(r.serviceType||'') + '</span>';
        html += '<span class="cal-time">&nbsp;' + esc(r.time||'') + '</span></div>';
        html += '<div class="cal-item-row"><span class="cal-unit">' + esc(r.unit||'') + '</span>';
        html += '<span class="cal-time">&nbsp;' + esc(r.name||'') + '</span>';
        if (r.method) html += '<span class="cal-method">&nbsp;' + esc(r.method) + '</span>';
        html += '</div></div>';
      });

      // 顯示尚未預約的時段
      var daySlots = (calState.slots || []).filter(function(s) {
        return s.date === dateStr && s.open &&
          (!calState.svcFilter || s.serviceType === calState.svcFilter);
      }).sort(function(a,b) { return (a.time||'').localeCompare(b.time||''); });

      daySlots.forEach(function(s) {
        var remain = s.capacity - s.bookedCount;
        if (s.bookedCount === 0) {
          html += '<div class="cal-slot-empty">';
          html += '<span class="cal-slot-tag">○ ' + esc(s.time) + '</span>';
          html += '<span>' + esc(s.serviceType) + '</span>';
          html += '<span class="cal-slot-cap">（共' + s.capacity + '位）</span>';
          html += '</div>';
        } else if (remain > 0) {
          html += '<div class="cal-slot-remain">';
          html += '<span>' + esc(s.time) + ' ' + esc(s.serviceType) + '</span>';
          html += '<span class="cal-slot-cap">　剩 ' + remain + ' 位</span>';
          html += '</div>';
        }
      });

      html += '</div>';
    }
    document.getElementById('cal-grid').innerHTML = html;
  }
  // ────────────────────────────────────────────────────────────

  // ── 側邊欄群組收合 ──────────────────────────────────────────
  function toggleGroup(groupId) {
    var items = document.getElementById('sg-' + groupId);
    var arrow = document.getElementById('sg-arrow-' + groupId);
    if (!items) return;
    var collapsed = items.classList.toggle('collapsed');
    if (arrow) arrow.textContent = collapsed ? '▶' : '▼';
  }

  // ── 基本資料搜尋 ──────────────────────────────────────────
  function queryProfile() {
    var projectCode = document.getElementById('select-project').value;
    if (!projectCode) { showToast('請先選擇建案', 'error'); return; }
    var filters = {
      name:   document.getElementById('pf-name').value.trim(),
      unit:   document.getElementById('pf-unit').value.trim(),
      floor:  document.getElementById('pf-floor').value.trim(),
      idCard: document.getElementById('pf-idcard').value.trim()
    };
    showLoading(true);
    callServer('serverAdminGetCustomers', projectCode, filters)
      .then(function(data) {
        if (!Array.isArray(data)) {
          showToast((data && data.message) || '功能尚未開放，請聯絡系統管理員', 'error');
          showLoading(false); return;
        }
        renderProfileTable(data);
      })
      .catch(function(err) { showToast('查詢失敗：' + err.message, 'error'); })
      .then(function() { showLoading(false); });
  }

  function resetProfileFilter() {
    ['pf-name','pf-unit','pf-floor','pf-idcard'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('pf-result-bar').classList.add('hidden');
    document.getElementById('pf-table-wrap').classList.add('hidden');
  }

  function renderProfileTable(data) {
    document.getElementById('pf-result-count').textContent = data.length;
    document.getElementById('pf-result-bar').classList.remove('hidden');
    document.getElementById('pf-table-wrap').classList.remove('hidden');
    var head = document.getElementById('pf-table-head');
    var body = document.getElementById('pf-table-body');
    head.innerHTML = '<tr><th>#</th><th>姓名</th><th>戶別</th><th>樓層</th><th>客變狀態</th><th>對保狀態</th><th>驗屋狀態</th><th>備註事項</th></tr>';
    body.innerHTML = '';
    if (!data.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="8">查無符合條件的資料</td></tr>'; return;
    }
    data.forEach(function(r, i) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + (i+1) + '</td>' +
        '<td>' + esc(r.name||'—') + '</td>' +
        '<td>' + esc(r.unit||'—') + '</td>' +
        '<td>' + esc(r.floor||'—') + '</td>' +
        '<td>' + esc(r.kvStatus||'—') + '</td>' +
        '<td>' + esc(r.dbStatus||'—') + '</td>' +
        '<td>' + esc(r.yhStatus||'—') + '</td>' +
        '<td>' + esc(r.note||'—') + '</td>';
      body.appendChild(tr);
    });
  }

  // ── 帳務資訊搜尋 ──────────────────────────────────────────
  function queryBilling() {
    var projectCode = document.getElementById('select-project').value;
    if (!projectCode) { showToast('請先選擇建案', 'error'); return; }
    var filters = {
      name:   document.getElementById('bl-name').value.trim(),
      unit:   document.getElementById('bl-unit').value.trim(),
      idCard: document.getElementById('bl-idcard').value.trim()
    };
    showLoading(true);
    callServer('serverAdminGetBilling', projectCode, filters)
      .then(function(data) {
        if (!Array.isArray(data)) {
          showToast((data && data.message) || '功能尚未開放，請聯絡系統管理員', 'error');
          showLoading(false); return;
        }
        renderBillingTable(data);
      })
      .catch(function(err) { showToast('查詢失敗：' + err.message, 'error'); })
      .then(function() { showLoading(false); });
  }

  function resetBillingFilter() {
    ['bl-name','bl-unit','bl-idcard'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('bl-result-bar').classList.add('hidden');
    document.getElementById('bl-table-wrap').classList.add('hidden');
  }

  function renderBillingTable(data) {
    document.getElementById('bl-result-count').textContent = data.length;
    document.getElementById('bl-result-bar').classList.remove('hidden');
    document.getElementById('bl-table-wrap').classList.remove('hidden');
    var head = document.getElementById('bl-table-head');
    var body = document.getElementById('bl-table-body');
    head.innerHTML = '<tr><th>#</th><th>姓名</th><th>戶別</th><th>期數</th><th>應繳金額</th><th>繳款期限</th><th>繳款日期</th><th>本期收到金額</th><th>發票號碼</th><th>發票日期</th></tr>';
    body.innerHTML = '';
    if (!data.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="10">查無符合條件的資料</td></tr>'; return;
    }
    data.forEach(function(r, i) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + (i+1) + '</td>' +
        '<td>' + esc(r.name||'—') + '</td>' +
        '<td>' + esc(r.unit||'—') + '</td>' +
        '<td>' + esc(r.period||'—') + '</td>' +
        '<td>' + esc(r.amount||'—') + '</td>' +
        '<td>' + esc(r.dueDate||'—') + '</td>' +
        '<td>' + esc(r.paidDate||'—') + '</td>' +
        '<td>' + esc(r.received||'—') + '</td>' +
        '<td>' + esc(r.invoiceNo||'—') + '</td>' +
        '<td>' + esc(r.invoiceDate||'—') + '</td>';
      body.appendChild(tr);
    });
  }
  // ────────────────────────────────────────────────────────────

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.ms-wrap')) closeAllMs();
  });

  return { init, login, logout, switchTab, query, resetFilters, exportCsv, toggleMs, onDateChange, doSort,
           saveSettings, switchStgTab,
           loadSlotCal, slotCalNav, selectSlotDate, closeDayPanel,
           showSlotEditForm, hideSlotEditForm, saveSlotEdit, deleteSlotItem,
           toggleBatchForm, submitBatch,
           loadCalendar, calNav, exportCalPdf,
           toggleSidebar, toggleGroup,
           queryProfile, resetProfileFilter,
           queryBilling, resetBillingFilter,
           proxyOnUnitTypeChange, proxyOnFloorChange, proxyOnSvcChange,
           proxyOnDateChange, proxyOnTimeChange, proxyOnMethodChange,
           proxyReset, proxySubmit,
           addCustomerSubmit, addCustomerReset, acOnUnitTypeChange, acOnFloorChange };
})();

document.addEventListener('DOMContentLoaded', Admin.init);
</script>
